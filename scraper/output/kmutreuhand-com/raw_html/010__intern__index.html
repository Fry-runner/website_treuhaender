<!DOCTYPE html>
<html lang="de">

<head>
    <meta name="ac:route" content="/:lg/:url">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <base href="/intern/">
    <meta charset="UTF-8">

    <title>Login | ED-CMS</title>
    <link rel="icon" href="daten/favicon-ed.png" type="image/png">
    <meta name="description" content="Loginbereich für das ED-CMS. Das perfekte Content Management System für deine Website. Bei Fragen wende dich an Express Design.">
    <meta name="robots" content="noindex, nofollow">

    <script src="../dmxAppConnect/dmxAppConnect.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/81f8e18127.js" crossorigin="anonymous"></script>
    <script src="../dmxAppConnect/dmxBootstrap4Alert/dmxBootstrap4Alert.js" defer=""></script>
    <script src="../dmxAppConnect/dmxBrowser/dmxBrowser.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="../css/edcms-intern-bootstrap.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous">

    <style>
        .toggle-password {
            position: absolute;
            top: 8px;
            right: 15px;
            cursor: pointer;
            color: #888;
        }

        .toggle-password:hover {
            color: #000;
        }
    </style>
</head>

<body is="dmx-app" id="edcms">
    <div is="dmx-browser" id="browser1"></div>

    <div class="container" style="height: 100vh; display: flex; align-items: center; justify-content: center; ">
        <form id="form1" method="post" is="dmx-serverconnect-form" action="../dmxConnect/api/Security/login/Login.php" dmx-on:success="browser1.goto('dashboard.php')" dmx-on:unauthorized="login_benachrichtigung_sichtbar.setValue(1)" class="w-100">
                        <div class="login-window">
                <h1 class="mb-4">Login</h1>
                                <div class="form-group">
                    <label for="username">Benutzername</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Benutzername">
                </div>
                <div class="form-group">
                    <label for="password">Passwort</label>
                    <div class="position-relative">
                        <input type="password" class="form-control pr-5" id="password" name="password" placeholder="Passwort">
                        <span class="toggle-password" data-target="password">
                            <i class="fa fa-eye"></i>
                        </span>
                    </div>
                </div>
                <button class="btn btn-primary mt-4 mr-3" type="submit">Einloggen</button>
                <a class="btn btn-secondary mt-4" href="passwort_vergessen.php">Passwort vergessen</a>
                <div id="login_wrapper" dmx-show="login_benachrichtigung_sichtbar.value == 1">
                    <div class="alert alert-danger alert-dismissible fade show mt-4" role="alert">
                        <span>Login fehlgeschlagen!</span>
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close" onclick="dmx.parse('login_benachrichtigung_sichtbar.setValue(0)')">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                </div>
                <dmx-value id="login_benachrichtigung_sichtbar" dmx-bind:value="0"></dmx-value>
            </div>
        </form>
    </div>

    <script>
        document.querySelectorAll('.toggle-password').forEach(el => {
        el.addEventListener('click', function () {
            const input = document.getElementById(this.dataset.target);
            const icon = this.querySelector('i');

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js" integrity="sha384-+YQ4JLhjyBLPDQt//I+STsc9iw4uQqACwlvpslubQzn4u2UU2UFM80nGisd026JF" crossorigin="anonymous"></script>
</body>

</html>
