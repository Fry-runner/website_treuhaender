<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prototypes/pitch mockups must never be indexed (cold-acquisition: keep
         the prospect's brand off search engines). Pair with Vercel password
         protection for non-public sharing. -->
    <meta name="robots" content="noindex, nofollow" />
    <title>Design System — Structure × Look proof</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Expanded font inventory (see looks/fontPairings.ts) — kept in a separate
         link so a single bad family never breaks the core faces above. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Schibsted+Grotesk:wght@400;600;700&family=Familjen+Grotesk:wght@400;600;700&family=Bricolage+Grotesque:wght@400;600;700&family=Sora:wght@400;600;700&family=Manrope:wght@400;600;700&family=Epilogue:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;600;700&family=Lexend:wght@400;600;700&family=Fraunces:wght@400;600;700&family=Source+Serif+4:wght@400;600;700&family=Newsreader:wght@400;600;700&family=Spectral:wght@400;600;700&family=Lora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=Public+Sans:wght@400;600;700&family=Mulish:wght@400;600;700&family=Karla:wght@400;600;700&family=Work+Sans:wght@400;600;700&family=Figtree:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Mono:wght@400;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- UI/UX Pro Max finance/legal-trust faces (see looks/fontPairings.ts): EB Garamond·Lato,
         Lexend·Source Sans 3, IBM Plex Sans. Separate link so a missing weight (Lato has no 600)
         can't break the inventory above. -->
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Lato:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/playground.tsx"></script>
  </body>
</html>
